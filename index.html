<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Valorant Login</title>

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#0f1923;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    background:#1f2731;
    padding:40px;
    width:300px;
    text-align:center;
    border-radius:10px;
}

h1{
    color:#ff4655;
    margin-bottom:30px;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:none;
    border-radius:5px;
}

button{
    width:100%;
    padding:10px;
    background:#ff4655;
    border:none;
    color:white;
    font-weight:bold;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#e03b4a;
}

.footer{
    margin-top:15px;
    font-size:12px;
    color:gray;
}

</style>
</head>

<body>

<div class="login-box">

<h1>VALORANT</h1>

<input type="text" placeholder="Username">
<input type="password" placeholder="Password">

<button>Sign In</button>

<div class="footer">
Fan-made static login page
</div>

</div>

</body>
</html>
